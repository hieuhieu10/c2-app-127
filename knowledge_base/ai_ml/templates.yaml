templates:
  - template_id: problem_gap
    section: problem
    intent: State the gap without exaggerating it.
    template_text: "Existing approaches can {current_capability}, but they struggle with {specific_gap} under {conditions}. The paper asks whether {research_question}."
    input_variables: [current_capability, specific_gap, conditions, research_question]
    example_usage: "Existing classifiers work on familiar labels, but struggle with unseen categories. The paper asks whether text descriptions can provide reusable supervision."
  - template_id: problem_consequence
    section: problem
    intent: Explain why the gap matters.
    template_text: "{specific_gap} matters because it can lead to {practical_or_scientific_consequence}. The paper focuses on {scope}, rather than claiming to solve {out_of_scope}."
    input_variables: [specific_gap, practical_or_scientific_consequence, scope, out_of_scope]
    example_usage: "Expensive labels limit scaling. The paper focuses on representation learning, rather than eliminating all data curation."
  - template_id: solution_core
    section: solution
    intent: Describe the central mechanism.
    template_text: "The proposed method takes {input}, applies {core_mechanism}, and produces {output}. The main idea is that {intuition}, while {technical_caveat}."
    input_variables: [input, core_mechanism, output, intuition, technical_caveat]
    example_usage: "The method masks image patches and reconstructs them. This encourages useful representations, although reconstruction quality is not the final goal."
  - template_id: solution_stages
    section: solution
    intent: Explain a multi-stage method.
    template_text: "The approach has {stage_count} main stages: first, {stage_one}; next, {stage_two}; finally, {stage_three}. Each stage is intended to {combined_purpose}."
    input_variables: [stage_count, stage_one, stage_two, stage_three, combined_purpose]
    example_usage: "First it pretrains, next it adapts, and finally it evaluates; together these stages test transfer."
  - template_id: evidence_result
    section: evidence
    intent: Report a result with bounded interpretation.
    template_text: "On {dataset_or_task}, the method achieved {result} using {metric}, compared with {comparison}. The results suggest {supported_interpretation}, within this evaluation setting."
    input_variables: [dataset_or_task, result, metric, comparison, supported_interpretation]
    example_usage: "On ImageNet, it improved top-1 accuracy over the stated baseline, suggesting better classification in that setup."
  - template_id: evidence_comparison
    section: evidence
    intent: Compare fairly with a baseline.
    template_text: "Compared with {baseline}, the proposed method {difference}. This comparison is informative because {fairness_reason}; however, {comparison_caveat}."
    input_variables: [baseline, difference, fairness_reason, comparison_caveat]
    example_usage: "It trains faster than the recurrent baseline under reported hardware, though costs may differ elsewhere."
  - template_id: evidence_ablation
    section: evidence
    intent: Explain an ablation study.
    template_text: "When the authors removed or changed {component}, {metric_or_behavior} changed from {before} to {after}. This suggests the component contributes to {claim}, but does not establish that it is always necessary."
    input_variables: [component, metric_or_behavior, before, after, claim]
    example_usage: "Removing positional information reduced accuracy, suggesting it contributes to order awareness."
  - template_id: evidence_dataset
    section: evidence
    intent: Explain what a dataset supports.
    template_text: "{dataset} contains {contents} and is used to test {capability}. It represents {represented_setting}, but may not represent {missing_setting}."
    input_variables: [dataset, contents, capability, represented_setting, missing_setting]
    example_usage: "The benchmark contains English questions and tests answer selection, but may not represent multilingual use."
  - template_id: evidence_metric
    section: evidence
    intent: Translate a metric.
    template_text: "{metric} measures {what_it_measures}. A {direction} value generally indicates {interpretation}, although it does not directly measure {not_measured}."
    input_variables: [metric, what_it_measures, direction, interpretation, not_measured]
    example_usage: "BLEU measures overlap with reference translations. A higher value often indicates closer overlap, not necessarily human preference."
  - template_id: feasibility_limit
    section: feasibility
    intent: State a limitation and its consequence.
    template_text: "The approach depends on {dependency} and was evaluated under {tested_conditions}. Its reliability outside those conditions is uncertain, especially when {risk_condition}."
    input_variables: [dependency, tested_conditions, risk_condition]
    example_usage: "The approach depends on curated demonstrations and was tested on selected tasks; reliability on unfamiliar domains is uncertain."
  - template_id: feasibility_cost
    section: feasibility
    intent: Explain practical resource requirements.
    template_text: "Using the method requires {resources}. This may be practical for {suitable_users}, but less practical for {constrained_users}. The paper reports {reported_cost_evidence}."
    input_variables: [resources, suitable_users, constrained_users, reported_cost_evidence]
    example_usage: "Training requires many accelerators, which may suit large labs but not small teams."
  - template_id: feasibility_risk
    section: feasibility
    intent: Explain deployment risk without inventing certainty.
    template_text: "A plausible risk is {risk}, because {mechanism}. The paper {risk_evidence_status}; therefore, deployment would still require {mitigation_or_validation}."
    input_variables: [risk, mechanism, risk_evidence_status, mitigation_or_validation]
    example_usage: "A plausible risk is biased output because training data contain social patterns. The paper evaluates this only partially, so deployment needs targeted audits."

